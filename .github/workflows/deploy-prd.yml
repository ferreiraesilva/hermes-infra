name: Deploy hermes-prd

# GitOps: produção é deployada SÓ por este workflow. Ninguém edita prod na mão.
on:
  push:
    branches: [ main ]
    paths:
      - 'compose.base.yml'
      - 'compose.prd.yml'
      - '.github/workflows/deploy-prd.yml'
  workflow_dispatch:

concurrency:
  group: deploy-hermes-prd
  cancel-in-progress: false

jobs:
  deploy:
    # Runner self-hosted dedicado, registrado no repo hermes-base, label hermes-prd.
    runs-on: [self-hosted, hermes-prd]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar .env de segredos (a partir dos GitHub Secrets)
        run: |
          umask 077
          install -d -m 700 "$HOME/.hermes"
          printf 'TELEGRAM_BOT_TOKEN=%s\n' "${{ secrets.TELEGRAM_BOT_TOKEN }}" > "$HOME/.hermes/.env"
          chmod 600 "$HOME/.hermes/.env"
          echo "::notice::.env de prod regenerado a partir dos secrets"

      - name: Remover container Hermes legado (não gerenciado pelo compose)
        run: |
          # cutover one-time: remove o container manual antigo (ex: xenodochial_*),
          # preservando os dados (bind /home/leo/.hermes). Idempotente em re-runs.
          docker ps -a --filter ancestor=nousresearch/hermes-agent --format '{{.Names}}' \
            | grep -vx 'hermes-prd' | xargs -r docker rm -f || true

      - name: Deploy (gateway run, supervisionado, restart unless-stopped)
        run: |
          export HERMES_UID="$(id -u)" HERMES_GID="$(id -g)"
          docker compose -f compose.base.yml -f compose.prd.yml up -d

      - name: Healthcheck
        run: |
          sleep 8
          docker ps --filter name=hermes-prd --format '{{.Names}} -> {{.Status}}'
          docker inspect -f 'restarts={{.RestartCount}} status={{.State.Status}}' hermes-prd
