# hermes-base — fundação executável de uma instalação Hermes Agent.
#
# Define o serviço COMUM do gateway. Cada ambiente aplica um override que fixa
# imagem, nome do container, diretório de dados e extras:
#   produção:    docker compose -f compose.base.yml -f compose.prd.yml up -d
#   homologação: docker compose -f compose.base.yml -f compose.hml.yml up -d   (futuro)
#
# Princípios:
#  - Estado vive em /opt/data (bind-mount do host) — a imagem é imutável.
#  - s6-overlay supervisiona o gateway (auto-restart em crash).
#  - GitOps: este repo é a fonte da verdade; deploy só via GitHub Actions.
#
# HERMES_UID/HERMES_GID devem ser o uid/gid do dono do diretório de dados no
# host (o workflow define com `id -u`/`id -g`).
services:
  gateway:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent}
    restart: unless-stopped
    network_mode: host
    command: ["gateway", "run"]
    environment:
      - HERMES_UID=${HERMES_UID:?defina HERMES_UID (id -u do dono de /opt/data)}
      - HERMES_GID=${HERMES_GID:?defina HERMES_GID (id -g do dono de /opt/data)}
