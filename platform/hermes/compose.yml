services:
  gateway:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent@sha256:4b50f1201f280e28887f6a2d7bbcd50fe370e0da3e92417d6e51778b485cf18e}
    container_name: ${HERMES_CONTAINER_NAME:?defina HERMES_CONTAINER_NAME}
    restart: unless-stopped
    network_mode: host
    command: ["gateway", "run"]
    volumes:
      - ${HERMES_DATA_DIR:?defina HERMES_DATA_DIR}:/opt/data
      - ${HERMES_DATA_DIR:?defina HERMES_DATA_DIR}/runtime/whatsapp-bridge:/opt/hermes/plugins/scripts/whatsapp-bridge:ro
      - ${HERMES_DATA_DIR:?defina HERMES_DATA_DIR}/runtime/telegram-platform/adapter.py:/opt/hermes/plugins/platforms/telegram/adapter.py:ro
      - ${HERMES_FILES_DIR:?defina HERMES_FILES_DIR}:/opt/data/files
    environment:
      HERMES_UID: ${HERMES_UID:?defina HERMES_UID}
      HERMES_GID: ${HERMES_GID:?defina HERMES_GID}
      HERMES_DASHBOARD: ${HERMES_DASHBOARD:-}
      HERMES_DASHBOARD_HOST: ${HERMES_DASHBOARD_HOST:-0.0.0.0}
      HERMES_DASHBOARD_INSECURE: ${HERMES_DASHBOARD_INSECURE:-}
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:-}
