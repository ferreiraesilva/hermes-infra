# Override de PRODUÇÃO — host `solid` (truemobile), usuário leo.
# Use junto da base:
#   docker compose -f compose.base.yml -f compose.prd.yml up -d
#
# A imagem é PINADA por digest para reprodutibilidade. Para atualizar o Hermes
# de prod, troque o digest aqui (commit → o GitHub Actions reaplica).
services:
  gateway:
    container_name: hermes-prd
    # nousresearch/hermes-agent (digest capturado em 2026-06-21)
    image: nousresearch/hermes-agent@sha256:4b50f1201f280e28887f6a2d7bbcd50fe370e0da3e92417d6e51778b485cf18e
    volumes:
      - /home/leo/.hermes:/opt/data
